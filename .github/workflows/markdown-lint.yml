name: Markdown Lint + Link Check

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - '**/*.md'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
            !.git
        continue-on-error: true  # Style warnings shouldn't block; broken-link check below is the harder gate.

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal markdown links
        # Pin is deliberate: lychee-action v2 REMOVED the `--exclude-mail` flag
        # used in `args` below, so an unconsidered bump to @v2 breaks this workflow.
        # To upgrade: first drop `--exclude-mail` from args (v2 excludes mail via a
        # different mechanism), THEN bump the pin. Do not bump alone.
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --offline
            --include-fragments
            --exclude-mail
            './**/*.md'
          fail: true
        continue-on-error: false
