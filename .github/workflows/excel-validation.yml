name: Excel Template Validation

on:
  pull_request:
    paths:
      - 'templates/excel/**'
      - 'scripts/build_excel.py'
  push:
    branches: [main]
    paths:
      - 'templates/excel/**'
      - 'scripts/build_excel.py'

jobs:
  validate-excel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Verify all 9 templates open + critical formulas correct
        run: |
          python3 << 'EOF'
          import sys
          from openpyxl import load_workbook
          from pathlib import Path

          template_dir = Path("templates/excel")
          expected = [
              "partner-output-ledger.xlsx",
              "reward-species-declaration.xlsx",
              "business-review.xlsx",
              "klarna-test.xlsx",
              "metr-baseline.xlsx",
              "agent-skill-roi.xlsx",
              "eu-ai-act-mapping.xlsx",
              "treasury-runway.xlsx",
              "oot-readiness.xlsx",
          ]

          errors = []
          for name in expected:
              path = template_dir / name
              if not path.exists():
                  errors.append(f"{name}: NOT FOUND")
                  continue
              try:
                  wb = load_workbook(path, data_only=False)
                  sheets = wb.sheetnames
                  if "_metadata" not in sheets:
                      errors.append(f"{name}: missing _metadata sheet")
                  if "README" not in sheets:
                      errors.append(f"{name}: missing README sheet")
              except Exception as e:
                  errors.append(f"{name}: failed to open: {e}")

          # Critical formula sanity checks
          wb = load_workbook(template_dir / "partner-output-ledger.xlsx")
          ws = wb["Output_Log"]
          if not ws["L2"].value or "IF(I2=" not in str(ws["L2"].value):
              errors.append("X1 Output_Log L2 missing rework-zero-out formula")

          wb = load_workbook(template_dir / "metr-baseline.xlsx")
          ws = wb["Self_Report_vs_Actual"]
          if not ws["F2"].value or ">20" not in str(ws["F2"].value):
              errors.append("X5 perception-gap threshold not 20-point (B11 correction)")

          wb = load_workbook(template_dir / "klarna-test.xlsx")
          ws = wb["Klarna_Score"]
          if not ws["L2"].value or "SUM(B2:K2)" not in str(ws["L2"].value):
              errors.append("X4 Klarna_Score total formula missing")

          if errors:
              print("Validation errors:")
              for e in errors:
                  print(f"  x {e}")
              sys.exit(1)
          print("All 9 Excel templates validated.")
          EOF

      # ── Real drift check ────────────────────────────────────────────────────
      # Regenerate the templates from build_excel.py and compare the fresh output
      # cell-by-cell against the committed files. build_excel.py writes in-place
      # into templates/excel/, so we: (1) back the committed files up, (2) run
      # the generator, (3) compare committed-vs-regenerated, (4) always restore
      # the committed files via `git checkout` so the workspace is left clean.
      #
      # The _metadata sheet's generation_date cell (B3) legitimately changes on
      # every run, so it is the only tolerated difference.
      - name: Drift check — regenerate and compare cell-by-cell
        run: |
          set -euo pipefail
          mkdir -p /tmp/committed-xlsx
          cp templates/excel/*.xlsx /tmp/committed-xlsx/
          python3 scripts/build_excel.py
          python3 << 'EOF'
          import sys
          from pathlib import Path
          from openpyxl import load_workbook

          committed_dir = Path("/tmp/committed-xlsx")
          regen_dir = Path("templates/excel")
          names = sorted(p.name for p in committed_dir.glob("*.xlsx"))

          errors = []
          for name in names:
              a = load_workbook(committed_dir / name, data_only=False)
              b = load_workbook(regen_dir / name, data_only=False)
              if a.sheetnames != b.sheetnames:
                  errors.append(f"{name}: sheet names differ: {a.sheetnames} != {b.sheetnames}")
                  continue
              for sheet in a.sheetnames:
                  wsa, wsb = a[sheet], b[sheet]
                  max_row = max(wsa.max_row, wsb.max_row)
                  max_col = max(wsa.max_column, wsb.max_column)
                  for r in range(1, max_row + 1):
                      for c in range(1, max_col + 1):
                          # Tolerate the _metadata generation_date cell (B3).
                          if sheet == "_metadata" and r == 3 and c == 2:
                              continue
                          va = wsa.cell(row=r, column=c).value
                          vb = wsb.cell(row=r, column=c).value
                          if va != vb:
                              errors.append(
                                  f"{name}[{sheet}]!{wsa.cell(row=r, column=c).coordinate}: "
                                  f"committed={va!r} regenerated={vb!r}")
          if errors:
              print("Excel drift detected — committed files do not match build_excel.py output:")
              for e in errors[:100]:
                  print(f"  x {e}")
              if len(errors) > 100:
                  print(f"  ... and {len(errors) - 100} more")
              sys.exit(1)
          print(f"No drift: all {len(names)} templates match build_excel.py output "
                "(cell values + formulas; _metadata generation_date tolerated).")
          EOF

      - name: Restore committed templates
        if: always()
        run: git checkout -- templates/excel/
