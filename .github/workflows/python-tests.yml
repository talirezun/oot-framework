name: Python — Lint + Tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'installer/**'
      - 'templates/excel/**'
      - 'tests/**'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'installer/**'
      - 'templates/excel/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install openpyxl pyyaml

      # ── Hard gate: the test suite must pass. No `|| true`. ──
      - name: Pytest
        run: python -m pytest tests/ -q

      # ── Lint. Covers scripts/, installer/, AND tests/. Hard-gating since the
      # 2026-07-04 formatting pass cleared the tree (ruff --fix + black). ──
      - name: Ruff lint (scripts + installer + tests)
        run: python -m ruff check scripts/ installer/ tests/ --output-format=github

      - name: Black format check (scripts + installer + tests)
        run: python -m black --check scripts/ installer/ tests/
