name: Python — Lint + Tests

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'installer/**'
      - 'templates/excel/**'
      - 'tests/**'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'installer/**'
      - 'templates/excel/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install openpyxl pyyaml

      # ── Hard gate: the test suite must pass. No `|| true`. ──
      - name: Pytest
        run: python -m pytest tests/ -q

      # ── Lint. Covers scripts/ AND installer/. ──
      # TODO(v1.x): the tree is NOT yet ruff/black-clean, so lint is reported
      # (annotations) but not gating. Pre-existing dirt to clear before flipping
      # `continue-on-error` off:
      #   - scripts/build_excel.py: F401 (unused get_column_letter), F541 (f-string
      #     without placeholders); black would reformat build_excel.py + validate_skills.py.
      #   - installer/wizard.py: F401, F541 (~30 findings); black would reformat.
      # Reformatting source is out of scope for the CI-hardening pass; do it in a
      # dedicated formatting PR, then remove the two `continue-on-error` lines below.
      - name: Ruff lint (scripts + installer)
        continue-on-error: true
        run: python -m ruff check scripts/ installer/ --output-format=github

      - name: Black format check (scripts + installer)
        continue-on-error: true
        run: python -m black --check scripts/ installer/
