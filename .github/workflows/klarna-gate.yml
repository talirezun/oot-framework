name: Klarna Test Gate

# This workflow is the framework's pre-merge gate for any PR labelled `ai-replaces-human`.
# It posts the `oot/klarna-test` GitHub status check against the PR's head SHA.
# The check is set to PASSING only when:
#   - klarna-test.xlsx Klarna_Score for the matching test_id has total >= 14
#   - scorer_signoff = Yes
#   - non_beneficiary_signoff = Yes
#
# Branch protection on `main` (or your merge target) MUST require this status check.
# Without that protection, the gate is advisory rather than enforcing.
#
# See:
#   - governance/KLARNA-TEST.md (the rubric)
#   - skills/code-qa/SKILL.md §4.0 (the 5 setup pre-requisites)
#   - routines/cloud/R7.md (the trigger Routine)

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, reopened]

jobs:
  klarna-gate:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ai-replaces-human')
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Read Klarna_Score for the PR's test_id
        id: klarna-check
        run: |
          python3 << 'EOF'
          import os, sys, re
          from openpyxl import load_workbook

          # Find the test_id by looking at the most recent KT-YYYY-NNN entry whose trigger_ref matches this PR.
          # In a real deployment, R7 records the PR URL in trigger_ref; we match against the PR number.
          pr_number = "${{ github.event.pull_request.number }}"
          repo = "${{ github.event.repository.full_name }}"
          pr_url = f"https://github.com/{repo}/pull/{pr_number}"

          wb = load_workbook("templates/excel/klarna-test.xlsx")
          decision_log = wb["Decision_Log"]
          klarna_score = wb["Klarna_Score"]

          test_id = None
          for row in decision_log.iter_rows(min_row=2, values_only=True):
              if not row or not row[0]:
                  continue
              if row[4] and pr_url in str(row[4]):
                  test_id = row[0]
                  break

          if not test_id:
              print(f"::warning::No Klarna Test entry found for PR {pr_url}.")
              print(f"::warning::R7 should have created an entry. Check klarna-test.xlsx Decision_Log column E (trigger_ref).")
              # The status check stays failing until R7 creates the entry.
              # Output GitHub Actions output for downstream step
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("status=pending\n")
                  f.write("description=Klarna Test entry not yet created by R7\n")
              sys.exit(0)

          # Find the Klarna_Score row for this test_id
          score_row = None
          for row in klarna_score.iter_rows(min_row=2):
              if row[0].value == test_id:
                  score_row = row
                  break

          if not score_row:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("status=pending\n")
                  f.write(f"description=Klarna Test {test_id} created but not yet scored\n")
              sys.exit(0)

          # Read total + signoffs (columns B-K = Q1-Q10; L = total; N = scorer; O = non-beneficiary)
          total = score_row[11].value  # column L
          scorer_signoff = score_row[13].value  # column N
          nb_signoff = score_row[14].value  # column O

          if total is None:
              total = sum((r.value or 0) for r in score_row[1:11])

          passed = (
              isinstance(total, (int, float)) and total >= 14
              and scorer_signoff == "Yes"
              and nb_signoff == "Yes"
          )

          status = "success" if passed else "failure"
          if passed:
              description = f"Klarna Test {test_id}: PROCEED ({total}/20)"
          else:
              description = f"Klarna Test {test_id}: HOLD ({total or 0}/20, scorer={scorer_signoff}, NB={nb_signoff})"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"status={status}\n")
              f.write(f"description={description}\n")
              f.write(f"test_id={test_id}\n")
          EOF

      - name: Post status check
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.klarna-check.outputs.status }}' || 'pending';
            const description = '${{ steps.klarna-check.outputs.description }}' || 'Klarna Test in progress';
            const testId = '${{ steps.klarna-check.outputs.test_id }}' || '';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: status,
              target_url: testId
                ? `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/firm/klarna-tests/${testId}.md`
                : 'https://github.com/talirezun/oot-framework/blob/main/governance/KLARNA-TEST.md',
              description: description.substring(0, 140),
              context: 'oot/klarna-test',
            });
