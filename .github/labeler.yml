# Auto-labeller config for ai-replaces-human PRs.
# Configures GitHub's actions/labeler@v5 to apply the `ai-replaces-human` label
# when a PR diff matches one of the §4.8 signatures from skills/code-qa/SPEC.md.
#
# Heuristic; the partner reviews within 24h, confirms or removes.
# Dismissal reasons train the labeller (added via PR to this file).
#
# ─────────────────────────────────────────────────────────────────────────────
# ADAPT FOR YOUR FIRM'S PRODUCT REPOS.
# The `src/**` and `pages/api/**` globs below are commented out because this
# framework repo has no product code — they would never match here. Uncomment
# and point them at YOUR firm product's paths when you copy this file into a
# repo that contains application code routing work to humans.
# ─────────────────────────────────────────────────────────────────────────────
#
# See:
#   - skills/code-qa/SKILL.md §4.8 (auto-labeller signatures)
#   - .github/workflows/klarna-gate.yml (the gate this label triggers)
#   - routines/cloud/R7.md (the Routine that fires on the label)

ai-replaces-human:
  # Signature 1: PR removes a code path that previously routed work to a human.
  # Heuristic: any change to files matching keywords like 'manual_review',
  # 'escalate_to_human', 'human_in_loop', 'requires_review'.
  #
  # FIRM PRODUCT GLOBS — adapt for your firm's product repos, then uncomment:
  # - changed-files:
  #     - any-glob-to-any-file:
  #         - 'src/**/manual_review*'
  #         - 'src/**/escalate*'
  #         - 'src/**/human_review*'
  #         - 'src/**/requires_review*'
  #         - 'pages/api/**/manual_review*'

  # Signature 2: PR modifies the firm's live partner-output ledger.
  # In a firm Ledger repo this is firm/excel/partner-output-ledger.xlsx.
  # NOTE: intentionally NOT matching templates/excel/partner-output-ledger.xlsx —
  # that path is the framework's TEMPLATE, and Excel-regeneration PRs in this
  # repo (scripts/build_excel.py output) must not be auto-labelled. Firms:
  # uncomment and point at your live ledger path.
  # - changed-files:
  #     - any-glob-to-any-file:
  #         - 'firm/excel/partner-output-ledger.xlsx'

  # Signature 3: PR adds/edits a Skill folder SKILL.md.
  # The labeller config can't grep file content; a full signature-3 match
  # (frontmatter `automates: human_function: yes`) requires a custom workflow
  # step. Here any non-template SKILL.md change is at least a candidate.
  - changed-files:
      - any-glob-to-any-file:
          - 'skills/*/SKILL.md'
        all-globs-to-all-files:
          - '!skills/_TEMPLATE_SKILL.md'
