# Auto-labeller config for ai-replaces-human PRs.
# Configures GitHub's actions/labeler@v5 to apply the `ai-replaces-human` label
# when a PR diff matches one of the §4.8 signatures from skills/code-qa/SPEC.md.
#
# Heuristic; the partner reviews within 24h, confirms or removes.
# Dismissal reasons train the labeller (added via PR to this file).
#
# See:
#   - skills/code-qa/SKILL.md §4.8 (auto-labeller signatures)
#   - .github/workflows/klarna-gate.yml (the gate this label triggers)
#   - routines/cloud/R7.md (the Routine that fires on the label)

ai-replaces-human:
  # Signature 1: PR removes a code path that previously routed work to a human.
  # Heuristic: any deletion of files / functions matching keywords like
  # 'manual_review', 'escalate_to_human', 'human_in_loop', 'requires_review'.
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**/manual_review*'
          - 'src/**/escalate*'
          - 'src/**/human_review*'
          - 'src/**/requires_review*'
          - 'pages/api/**/manual_review*'

  # Signature 2: PR modifies partner-output-ledger.xlsx.
  # The Klarna gate is conservative: any modification to the source-of-truth ledger
  # gets the label. Partner reviews + dismisses if false-positive.
  - changed-files:
      - any-glob-to-any-file:
          - 'templates/excel/partner-output-ledger.xlsx'

  # Signature 3: PR adds a new Skill folder under skills/ with frontmatter
  # `automates: human_function: yes`.
  # The labeller config can't grep file content; signature 3 requires
  # a custom workflow step. Below: any new SKILL.md is at least a candidate.
  - changed-files:
      - any-glob-to-any-file:
          - 'skills/*/SKILL.md'
        all-globs-to-all-files:
          - '!skills/_TEMPLATE_SKILL.md'
